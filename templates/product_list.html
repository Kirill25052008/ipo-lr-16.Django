{% block content %}
<h2>Каталог товаров</h2>

<!-- Форма поиска и фильтрации -->
<form method="get" style="margin-bottom: 20px;">
    <input type="text" name="q" placeholder="Поиск по названию..." value="{{ request.GET.q }}">
    
    <select name="category">
        <option value="">Все категории</option>
        {% for cat in categories %} <!-- Предполагаем, что передали список категорий -->
            <option value="{{ cat.id }}">{{ cat.name }}</option>
        {% endfor %}
    </select>

    <button type="submit">Найти</button>
</form>

<!-- Список товаров -->
<div style="display: flex; flex-wrap: wrap; gap: 20px;">
    {% for product in products %}
    <div style="border: 1px solid #ccc; padding: 10px; width: 200px;">
        <img src="{{ product.image.url }}" alt="{{ product.name }}" style="width: 100%;">
        <h3><a href="{% url 'product_detail' product.pk %}">{{ product.name }}</a></h3>
        <p>Цена: {{ product.price }} руб.</p>
        
        <form action="{% url 'cart_add' product.id %}" method="post">
            {% csrf_token %}
            <button type="submit">Добавить в корзину</button>
        </form>
    </div>
    {% empty %}
    <p>Товары не найдены.</p>
    {% endfor %}
</div>
{% endblock %}
