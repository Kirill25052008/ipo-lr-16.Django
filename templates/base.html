<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Магазин</title>

    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Магазин</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Каталог</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Корзина</a></li>
                </ul>
                <div class="navbar-nav">
                    {% if user.is_authenticated %}
                        <span class="nav-item nav-link text-light">Привет, {{ user.username }}</span>
                        <a class="nav-link btn btn-outline-danger ms-2" href="#">Выйти</a>
                    {% else %}
                        <a class="nav-link" href="#">Войти</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-light text-center py-3 mt-auto border-top">
        <p>&copy; 2026 Магазин .</p>
    </footer>

    <script src="https://jsdelivr.net"></script>
    <script src="{% static 'js/main.js' %}"></script>
    {% block scripts %}
    {% endblock %}

</body>
</html>
